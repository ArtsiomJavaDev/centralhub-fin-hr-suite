name: Feature request
description: Propose an improvement or workflow enhancement
title: "Feature: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or workflow pain
      description: What manual step, risk, or repeated task should this solve?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the expected behavior.
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - CRM automation
        - Excel import
        - payroll database
        - Tax / ZUS calculation
        - Reporting / export
        - UI
        - Other
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      placeholder: |
        - Given ...
        - When ...
        - Then ...
    validations:
      required: false

